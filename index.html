<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Javascript-with-me</title>
    <link rel="stylesheet" href="./style-index.css">
</head>
<body>
    <div class="container">
        <!-- Wrap inputs in a <form> for functionality -->
        <form class="box" action="/submit-login" method="POST">
            <h1 class="login-text">Login</h1>
            
            <div class="inputs">
                <!-- Labels are essential for accessibility -->
                <label for="mail">Email Address</label>
                <input type="email" id="mail" name="email" 
                       placeholder="example@email.com" required 
                       autocomplete="username">
                
                <label for="passkey">Password</label>
                <input type="password" id="passkey" name="password" 
                       placeholder="Enter your password" required 
                       minlength="8" autocomplete="current-password">
            </div>

            <!-- Set button type to "submit" -->
            <div class="loginButton">
                <button type="submit" class="login">Login</button>
            </div>

            <div class="text">
                Don't have an account? <a href="./Signup.html">Signup</a>
            </div>
        </form>
    </div>
</body>
</html>
